/span><br><span class="line"></span><br><span class="line">    <span class="type">int</span> day,hour, minute = <span class="number">0</span>;</span><br><span class="line">    cout &lt;&lt; <span class="string">&quot;请输入你的秒数&quot;</span> &lt;&lt; endl;</span><br><span class="line">    cin &gt;&gt; seconds;</span><br><span class="line">    day = seconds / (Day_To_Hour * Hour_To_Minute * Minute_To_Second);</span><br><span class="line">    seconds = seconds % (Day_To_Hour * Hour_To_Minute * Minute_To_Second);</span><br><span class="line"></span><br><span class="line">    hour = seconds / (Hour_To_Minute * Minute_To_Second);</span><br><span class="line">    seconds = seconds % (Hour_To_Minute * Minute_To_Second);</span><br><span class="line"></span><br><span class="line">    minute = seconds / Minute_To_Second;</span><br><span class="line">    seconds = seconds % Minute_To_Second; <span class="comment">//每次的秒的余数</span></span><br><span class="line"></span><br><span class="line">    cout &lt;&lt; day &lt;&lt;<span class="string">&quot;day&quot;</span> &lt;&lt; hour &lt;&lt;<span class="string">&quot;hour&quot;</span> &lt;&lt; minute &lt;&lt;<span class="string">&quot;minute&quot;</span> &lt;&lt; seconds &lt;&lt; <span class="string">&quot;seconds&quot;</span> &lt;&lt; endl;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
